      - alert: "[{{ .project_name }}] {{ .experiment_name }} time lags absent"
        expr: |
          absent_over_time(yt_queue_agent_consumer_partition_lag_time_max{
            consumer_path=~"{{ .experiment_yt_path }}/consumers/.*",
            partition_index=""
          }[{{ .duration }}])
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Метрика лага по времени отсутствует в течение {{ .duration }} секунд.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} метрика лага по времени отсутствует {{ .duration }}.
