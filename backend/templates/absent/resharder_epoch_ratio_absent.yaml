      - alert: "[{{ .project_name }}] {{ .experiment_name }} resharder epoch ratio absent"
        expr: |
          absent_over_time(rtse_epochs_total{sf_experiment_id="{{ .experiment_id }}", instance=~".*rsdr.*"}[{{ .duration }}])
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Метрики эпох решардера отсутствуют в течение {{ .duration }} секунд.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} метрики эпох решардера отсутствуют {{ .duration }}.
