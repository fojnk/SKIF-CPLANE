      - alert: "[{{ .project_name }}] {{ .experiment_name }} resharder consumed absent"
        expr: |
          absent_over_time(yt_queue_agent_consumer_partition_rows_consumed{
            consumer_cluster="miranda",
            consumer_path=~"{{ .experiment_yt_path }}/consumers/resharder",
            partition_index=""
          }[{{ .duration }}])
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Потребление сообщений решардером отсутствует в течение {{ .duration }} секунд.

            Текущее значение: {{"{{"}} printf "%.4f" $value {{"}}"}} сообщений/сек.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} потребление сообщений решардером отсутствует в течение {{ .duration }}.
