      - alert: "[{{ .project_name }}] {{ .experiment_name }} resharder row count is empty input absent"
        expr: |
          absent_over_time(rtse_messages_count_input{sf_experiment_id="{{ .experiment_id }}", instance=~".*rsdr.*"}[{{ .duration }}])
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Метрика количества входящих сообщений в resharder отсутствует {{ .duration }} секунд.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} метрика входящих сообщений resharder отсутствует {{ .duration }}.
