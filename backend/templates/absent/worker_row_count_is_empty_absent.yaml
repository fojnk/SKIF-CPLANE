      - alert: "[{{ .project_name }}] {{ .experiment_name }} worker row count is empty absent"
        expr: |
          absent_over_time(rtse_processed_messages{sf_experiment_id="{{ .experiment_id }}", instance=~".*wrkr.*"}[{{ .duration }}])
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Метрика обработанных сообщений worker'ов отсутствует {{ .duration }} секунд.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} метрика обработанных сообщений worker'ов отсутствует {{ .duration }}.
