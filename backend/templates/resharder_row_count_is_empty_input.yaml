      - alert: "[{{ .project_name }}] {{ .experiment_name }} resharder row count is empty input"
        expr: |
          max(sum by(stream) (
            min by (cloud_dc, cloud_instance, stream) (
              rate(rtse_messages_count_input{sf_experiment_id="{{ .experiment_id }}", instance=~".*rsdr.*"}[1m])
            )
          )) < 0.001
        for: {{ .duration }}
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Количество входящих сообщений в resharder меньше 0.001.

            Текущее значение: {{"{{"}} printf "%.4f" $value {{"}}"}} сообщений/сек.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} resharder не получает входящие сообщения.
