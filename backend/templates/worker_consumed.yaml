      - alert: "[{{ .project_name }}] {{ .experiment_name }} worker consumed"
        expr: |
          min(rate(yt_queue_agent_consumer_partition_rows_consumed{
            consumer_cluster="miranda",
            consumer_path=~"{{ .experiment_yt_path }}/consumers/worker",
            partition_index=""
          }[5m])) < {{ .limit }}
        for: {{ .duration }}
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Потребление сообщений воркером ниже порога {{ .limit }} сообщений/сек.

            Текущее значение: {{"{{"}} printf "%.4f" $value {{"}}"}} сообщений/сек.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} потребление сообщений воркером ниже {{ .limit }} сообщений/сек.
