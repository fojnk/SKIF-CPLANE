      - alert: "[{{ .project_name }}] {{ .experiment_name }} resharder epoch ratio"
        expr: |
          min(
            sum(rate(rtse_epochs_failed{sf_experiment_id="{{ .experiment_id }}", instance=~".*rsdr.*"}[5m]) or 0) / 
            sum(rate(rtse_epochs_total{sf_experiment_id="{{ .experiment_id }}", instance=~".*rsdr.*"} [5m]) or 1),
            1
          ) > {{ .limit }}
        for: {{ .duration }}
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Превышен порог в {{ .limit }} допустимого соотношения неудачных эпох решардера.

            Текущее значение: {{"{{"}} printf "%.4f" $value {{"}}"}}

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} соотношение неудачных эпох решардера более {{ .limit }}.
