      - alert: "[{{ .project_name }}] {{ .experiment_name }} row lags"
        expr: | 
          max(yt_queue_agent_consumer_partition_lag_rows_sum{
            consumer_path=~"{{ .experiment_yt_path }}/consumers/.*",
            partition_index=""
          }) > {{ .limit }}
        for: {{ .duration }}
        keep_firing_for: {{ .resolve_duration }}
        labels:
          <<: *common_labels
          severity: {{ .severity }}
        annotations:
          description: |
            Превышен порог в {{ .limit }} строк допустимого лага очереди.

            Текущее значение: {{"{{"}} printf "%.2f" $value {{"}}"}} строк.

            ссылка на пайплайн: https://streamflow.vk.team/project?id={{ .project_id }}&selected=pipe-{{ .experiment_id }}&p-tab=config
          summary: У проекта {{ .project_name }} в пайплайне {{ .experiment_name }} лаг в очереди более {{ .limit }} строк.
