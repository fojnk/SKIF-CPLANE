package CPlane.Cube;
import "google/protobuf/descriptor.proto";

enum ECacheType {
  ECT_LRU = 1;
  ECT_FRU = 2;
}

message TRetryOptions {
  message TLinearInterval {
    required string Interval = 1;
  }
  message TExponentialInterval {
    required string InitialInterval = 1;
    optional string MaxInterval = 2;
    required double GrowthRate = 3;
  }

  enum EAllRetriesFailedPolicy {
    Drop = 1;
    // сообщение будет отправлено в выход dead_letters
    SendDeadLetter = 2;
  }

  repeated string ShardingKeys = 1;
  optional string ShardingHashKey = 2;
  optional bool ShardingRoundRobin = 3;

  // Если не указаны RetryKeys, то в качестве них
  // будут использованы ShardingKeys
  repeated string RetryKeys = 4;

  optional EAllRetriesFailedPolicy AllRetriesFailedPolicy = 8 [default = Drop];

  required uint64 MaxRetryCount = 5;
  oneof IntervalOptions {
    TLinearInterval LinearIntervalOptions = 6;
    TExponentialInterval ExponentialIntervalOptions = 7;
  }
}



message TLookuperOptions {
  optional string SourceName = 1;
  repeated string Columns = 2; // empty val = all from source
  repeated string SelectKeyColumns = 3; // empty val = lookup with full key, else select with prefix
  optional string SelectIndexTable = 4;
}


message TKVInsertOptions {
  optional string SourceName = 1;
  repeated string Columns = 2; // empty val = all from source
  optional bool SharedWrite = 3 [default=false];
}

message TMultiLookupOptions {
  optional string YPathLookupKey = 3; // путь к ключу для лукапа
  optional string YPathDataAlias = 4; // путь к алиасу Input-а
  map<string, string> DataAlias2SourceName = 5; // маппинг из данных в имя инпута
}

message TMultiKVInsertOptions {
  repeated string SourceNames = 2;
  optional string YPathInsertValue = 3;  // путь к значению которое нужно вставить
  optional string YPathAlias = 4;
  map<string, string> DataAlias2SourceName = 5;
}

message TQYTInsertOptions {
  optional string SourceName = 1;
  optional string CompressionCodec = 2;
}

message TColumnSchema
{
  required string name = 1;
  optional string stable_name = 12;

  optional int32 type = 2;
  optional int32 logical_type = 3;
  optional bytes type_v3 = 11; // YSON representation of type_v3

  optional string lock = 4;
  optional string expression = 5;
  optional bool materialized = 13;
  optional string aggregate = 6;
  optional int32 sort_order = 7;
  optional string group = 8;
  optional bool required = 9 [default = false];
  optional int64 max_inline_hunk_size = 10;
}


enum EJoinType {
  EJT_INNER = 1;
  EJT_LEFT = 2;
}

enum EAnyType {
  EAT_NONE = 1;
  EAT_LEFT = 2;
  EAT_RIGHT = 3;
  EAT_ALL = 4;
}

message TStatefulSyncJoinerOptions {
  optional string StateAlias = 1;
  optional EJoinType JoinType = 2;
  repeated string JoinKeys = 3;
  optional EAnyType AnyType = 4;
  optional bool DelayedQueueEnabled = 5 [default=false];
  optional string TimestampProviderCluster_ = 6 [default="miranda.yt.idzn.ru"];
  optional bool AllowMissingKeys = 7 [default=false];
}

message TConcatOptions {
  repeated string OutputNames = 1;
}

message TSideCarOptions {

}

message TDatavaultGenerateKeyOptions {

}

message TConcatWithDelayOptions {
  repeated string OutputNames = 1;
  optional uint64 DelayMilliseconds = 2;
}

message TThrowOptions {
  optional string Text = 1;
}

enum EValidationType {
  EVT_THROW_ON_ERROR = 1;       // Бросать исключение при ошибке
  EVT_FILTER = 2;               // Фильтровать невалидные строки
  EVT_FILTER_AND_REDIRECT = 3;  // Фильтровать и перенаправлять невалидные строки
}

enum EUnknownFieldPolicy {
  EUFP_INVALIDATE = 1;  // Строка невалидна при наличии неизвестных полей
  EUFP_REMOVE = 2;      // Удалять неизвестные поля
  EUFP_IGNORE = 3;      // Игнорировать неизвестные поля
}

message TDeletedColumn
{
  required string stable_name = 1;
}


message TTableSchema
{
  repeated TColumnSchema columns = 1;
  optional bool strict = 2 [default = true];
  optional bool unique_keys = 3 [default = false];
  repeated TDeletedColumn deleted_columns = 5;
}


message TSchemeValidatorOptions {
  optional TTableSchema Schema = 1;
  optional EUnknownFieldPolicy UnknownFieldPolicy = 2;
  optional EValidationType ValidationType = 3;
}

message TTransformOptions {
  message TTransformFieldRule {
    optional string SourcePath = 1;
    optional string TargetColumnName = 2;
    optional string DefaultValue = 3;
  }
  repeated TTransformFieldRule Rules = 1;
  optional bool NullOnMissingValues = 2 [default=false];
  optional string RootObjectPath = 3;
}

enum EUserBinaryMode {
  EUBIO_ONESHOT = 1;
  EUBIO_STREAM_HEADER = 2;
}

message TUserBinaryOptions {
  message TGrpcSettings {
    optional uint64 Port = 1;
  }
  message TPipesSettings {
  }

  optional string Command = 1;
  optional EUserBinaryMode Mode = 2;
  optional string YtServerExecPath_ = 3 [default='/rtse/ytserver-exec'];
  optional uint64 TimeoutMs = 4 [default = 15000];
  optional string LogDir_ = 5 [default="/one/logs"];
  optional bool PortoEnabled = 6 [default=false];
  optional bool UseRtseLayer = 7 [default=false];
  optional string ContainerNamePrefix = 8 [default="/run/flow_container_"];
  optional string UserBinaryArchivePath = 9;
  optional string PortoLayersPath = 10 [default="/data/yt/layers"];

  oneof ProtocolSettings {
    TGrpcSettings GrpcSettings = 12;
    TPipesSettings PipesSettings = 13;
  }
}

message TCachingLookuperOptions {
  required string StateName = 1;
}

message TCachingKvInserterOptions {
  required string StateName = 1;
}

message TStatefulKeyValueJoinerOptions {
  message TJoinState {
    required string StateAlias = 1;
    repeated string JoinKeys = 2;
    required string OutputMessagePath = 3;
  }

  optional EJoinType JoinType = 1;
  optional EAnyType AnyType = 2;

  repeated TJoinState StatesToJoin = 3;
  // путь в выходном сообщении, куда в yson пойдет исходное сообщение.
  // можно использовать ".", если нужно оставить исходное сообщение корневым
  optional string SourceMessagePath = 4;
}


message TCubeConfig {
  enum ECubeInputType {
    CIT_CUBE = 1;
    CIT_RESHARDER = 2;
    CIT_RETRY = 3;
  }
  message TCubeInputConfig {
    required ECubeInputType Type = 1;
    optional string CubeName = 2;
    optional string OutputName = 3;
  }

  required string Name = 1;
  // Key - cube input name
  map<string, TCubeInputConfig> InputsMapping = 2;
  repeated string OutputNames = 3;
  oneof Cube {
    TQYTInsertOptions QYTInsertOptions = 4;
    TKVInsertOptions KVInsertOptions = 5;
    TLookuperOptions Lookuper = 6; // 1 input, 1 output with lookuped data in array
    TSideCarOptions SideCar = 7; // any count of inputs, any count outputs
    TStatefulSyncJoinerOptions StatefulSyncJoiner = 8; // input 2 streams, output 1 inner/left joined stream
    TConcatOptions Concat = 9;
    TDatavaultGenerateKeyOptions DatavaultGenerateKey = 10;
    TSchemeValidatorOptions SchemeValidator = 11;
    TConcatWithDelayOptions ConcatWithDelay = 12;
    TThrowOptions Throw = 13;
    TYQLOptions YQLOptions = 14;
    TTransformOptions Extract = 15;
    TCachingLookuperOptions CachingLookuper = 16;
    TCachingKvInserterOptions CachingKvInserter = 17;
    TMultiLookupOptions MultiLookupOptions = 18;
    TMultiKVInsertOptions MultiKVInsertOptions = 19;
    TPythonOptions PythonOptions = 20;
    TTransformOptions Transform = 21;
    TUserBinaryOptions UserBinaryOptions = 22;
    TRetryOptions RetryCubeOptions = 23;
    TStatefulKeyValueJoinerOptions KVJoinCubeOptions = 24;
  }
}



enum EPythonDataFormat {
  PythonYsonBinary = 0;
  PythonSkiff = 1; // not supported yet
}

message TPythonMapInputSpec {
  repeated bytes Schemas = 1; // yson
  repeated string SchemaSourceNames = 3;
  optional EPythonDataFormat DataFormat = 2;
}

message TPythonMapOutputSpec {
  repeated bytes Schemas = 1; // yson
  optional EPythonDataFormat DataFormat = 2;
  repeated string SchemaSourceNames = 3;
}

message TPythonMapSpec {
  optional TPythonMapInputSpec Input = 1;
  optional TPythonMapOutputSpec Output = 2;
}

message TPythonReduceSpec {
}

message TPythonOptions {
  oneof TSpec {
    TPythonMapSpec MapSpec = 1;
    TPythonReduceSpec ReduceSpec = 2;
  }
  optional string Script = 3;              // Python script content (like Query in YQL)
  optional string PythonBinaryPath_ = 4 [default='/usr/bin/python3'];
  optional int64 RunTimeoutMs = 5;
  optional bool PortoEnabled = 6 [default=false];
  optional bool UseRtseLayer = 7 [default=false];
  optional string ContainerNamePrefix = 8 [default="/run/flow_container_"];
  optional string ScriptArgs = 9 [default=""]; // Additional script arguments (e.g., "--input /path/to/file --debug")
  optional string UserBinaryArchivePath = 10;
}

enum EDataFormat {
  YsonBinary = 0;
  Skiff = 1; // not supported yet
}

enum EEnumYsonStorageType
{
  EYST_STRING = 0;
  EYST_INT = 1;
}

extend google.protobuf.FieldOptions
{
  optional string field_name = 3000;
  repeated string field_name_alias = 3003;
  optional bool yson_string = 3001;
  optional bool yson_map = 3002;
  optional bool required = 3004;
  optional EEnumYsonStorageType enum_yson_storage_type = 3005;
  optional bool strict_enum_value_check = 3006;
}

extend google.protobuf.EnumValueOptions
{
  optional string enum_value_name = 3001;
}

extend google.protobuf.EnumValueOptions {
  optional string json_enum_value = 4242279;
}


extend google.protobuf.MessageOptions
{
  optional bool attribute_dictionary = 3000;
}

extend google.protobuf.FileOptions
{
  optional bool derive_underscore_case_names = 3000;
}



message TColumn {
  // TypeV3: https://ytsaurus.tech/docs/ru/user-guide/storage/data-types#schema
  enum EPrimitiveType {
    unknown        = 0  [
      (enum_value_name) = "unknown",
      (json_enum_value)                  = "unknown"
    ];

    // This is simple type value for bool.
    boolean        = 1  [
      (enum_value_name) = "boolean",
      (json_enum_value)                  = "boolean"
    ];
    // This is type_v3 value for bool.
    bool           = 2  [
      (enum_value_name) = "bool",
      (json_enum_value)                  = "bool"
    ];

    uint64         = 3  [
      (enum_value_name) = "uint64",
      (json_enum_value)                  = "uint64"
    ];
    int64          = 4  [
      (enum_value_name) = "int64",
      (json_enum_value)                  = "int64"
    ];
    uint32         = 5  [
      (enum_value_name) = "uint32",
      (json_enum_value)                  = "uint32"
    ];
    int32          = 6  [
      (enum_value_name) = "int32",
      (json_enum_value)                  = "int32"
    ];
    float          = 7  [
      (enum_value_name) = "float",
      (json_enum_value)                  = "float"
    ];
    double         = 8  [
      (enum_value_name) = "double",
      (json_enum_value)                  = "double"
    ];

    string         = 9  [
      (enum_value_name) = "string",
      (json_enum_value)                  = "string"
    ];
    utf8           = 10 [
      (enum_value_name) = "utf8",
      (json_enum_value)                  = "utf8"
    ];

    json           = 11 [
      (enum_value_name) = "json",
      (json_enum_value)                  = "json"
    ];
    // This is type_v3 value for bool.
    yson           = 12 [
      (enum_value_name) = "yson",
      (json_enum_value)                  = "yson"
    ];
    // This is simple type value for bool.
    any            = 13 [
      (enum_value_name) = "any",
      (json_enum_value)                  = "any"
    ];

    uuid           = 14 [
      (enum_value_name) = "uuid",
      (json_enum_value)                  = "uuid"
    ];

    datetime       = 15 [
      (enum_value_name) = "datetime",
      (json_enum_value)                  = "datetime"
    ];
    timestamp      = 16 [
      (enum_value_name) = "timestamp",
      (json_enum_value)                  = "timestamp"
    ];

    int16          = 17 [
      (enum_value_name) = "int16",
      (json_enum_value)                  = "int16"
    ];
    int8           = 18 [
      (enum_value_name) = "int8",
      (json_enum_value)                  = "int8"
    ];
    uint16         = 19 [
      (enum_value_name) = "uint16",
      (json_enum_value)                  = "uint16"
    ];
    uint8          = 20 [
      (enum_value_name) = "uint8",
      (json_enum_value)                  = "uint8"
    ];

    date           = 21 [
      (enum_value_name) = "date",
      (json_enum_value)                  = "date"
    ];
    date32         = 22 [
      (enum_value_name) = "date32",
      (json_enum_value)                  = "date32"
    ];
    datetime64     = 23 [
      (enum_value_name) = "datetime64",
      (json_enum_value)                  = "datetime64"
    ];
    timestamp64    = 24 [
      (enum_value_name) = "timestamp64",
      (json_enum_value)                  = "timestamp64"
    ];

    interval64     = 25 [
      (enum_value_name) = "interval64",
      (json_enum_value)                  = "interval64"
    ];
    interval       = 26 [
      (enum_value_name) = "interval",
      (json_enum_value)                  = "interval"
    ];

    tz_date        = 27 [
      (enum_value_name) = "tz_date",
      (json_enum_value)                  = "tz_date"
    ];
    tz_datetime    = 28 [
      (enum_value_name) = "tz_datetime",
      (json_enum_value)                  = "tz_datetime"
    ];
    tz_timestamp   = 29 [
      (enum_value_name) = "tz_timestamp",
      (json_enum_value)                  = "tz_timestamp"
    ];
    tz_date32      = 30 [
      (enum_value_name) = "tz_date32",
      (json_enum_value)                  = "tz_date32"
    ];
    tz_datetime64  = 31 [
      (enum_value_name) = "tz_datetime64",
      (json_enum_value)                  = "tz_datetime64"
    ];
    tz_timestamp64 = 32 [
      (enum_value_name) = "tz_timestamp64",
      (json_enum_value)                  = "tz_timestamp64"
    ];

    null           = 33 [
      (enum_value_name) = "null",
      (json_enum_value)                  = "null"
    ];
    void           = 34 [
      (enum_value_name) = "void",
      (json_enum_value)                  = "void"
    ];
  }

  message TStruct {
    repeated TColumn fields = 1;
  }

  message TTuple {
    repeated TColumn types = 1;
  }

  message TDict {
    optional TColumn key = 1;
    optional TColumn value = 2;
  }

  oneof value {
    EPrimitiveType type = 100;
    TColumn list = 101;
    TStruct struct = 102;
    TTuple tuple = 103;
    TDict dict = 104;
  }
  optional bool optional = 1;

  extensions 10 to 99;
}

enum EColumnSortOrder {
  SORT_NONE       = 0 [
    (enum_value_name) = "none",
    (json_enum_value)                  = "none"
  ];

  SORT_ASCENDING  = 1 [
    (enum_value_name) = "ascending",
    (json_enum_value)                  = "ascending"
  ];
  SORT_DESCENDING = 2 [
    (enum_value_name) = "descending",
    (json_enum_value)                  = "descending"
  ];
}

enum EColumnAggregation {
  AGGREGATE_NONE     = 0 [
    (enum_value_name) = "none",
    (json_enum_value)                  = "none"
  ];

  AGGREGATE_SUM      = 1 [
    (enum_value_name) = "sum",
    (json_enum_value)                  = "sum"
  ];

  AGGREGATE_MIN      = 2 [
    (enum_value_name) = "min",
    (json_enum_value)                  = "min"
  ];
  AGGREGATE_MAX      = 3 [
    (enum_value_name) = "max",
    (json_enum_value)                  = "max"
  ];
  AGGREGATE_FIRST    = 4 [
    (enum_value_name) = "first",
    (json_enum_value)                  = "first"
  ];

  AGGREGATE_XDELTA   = 5 [
    (enum_value_name) = "xdelta",
    (json_enum_value)                  = "xdelta"
  ];

  AGGREGATE_DICT_SUM = 6 [
    (enum_value_name) = "dict_sum",
    (json_enum_value)                  = "dict_sum"
  ];
}


extend TColumn {
  optional string column_name = 10;

  optional bool sorted = 11;
  optional EColumnSortOrder sort_order = 12;

  optional string data_group = 13 [default = "default"];
  optional string lock_group = 14;

  optional string expression = 15;
  optional EColumnAggregation aggregation = 16;

  optional uint64 hunk_size = 17;
}

message TSchema {
  repeated TColumn columns = 1;
}


message TMapInputSpec {
  repeated bytes Schemas = 1; // yson
  repeated string SchemaSourceNames = 3;
  optional EDataFormat DataFormat = 2;
  repeated TSchema NormalizedSchemas = 4;
}

message TMapOutputSpec {
  repeated bytes Schemas = 1; // yson
  optional EDataFormat DataFormat = 2;
  repeated string SchemaSourceNames = 3;
  repeated TSchema NormalizedSchemas = 4;
}

message TMapSpec {
  optional TMapInputSpec Input = 1;
  optional TMapOutputSpec Output = 2;
}

message TReduceSpec {
}

message TPortoLayers {
  optional string BaseLayerPath = 1;
  optional bool UseRtseLayer = 2 [default=false];
  repeated string UserBinaryLayerPaths = 3;
}


message TYQLOptions {
  oneof TSpec {
    TMapSpec MapSpec = 1;
    TReduceSpec ReduceSpec = 2;
  }
  optional string Query = 3;
  optional string UdfsDirPath = 4;
  optional int64 RunTimeoutMs = 5;
  optional string YqlBinaryPath_ = 6 [default='/rtse/yql/generic_sidecar_v3'];
  optional bool PortoEnabled = 7 [default=false];
  optional string ContainerNamePrefix = 8 [deprecated=true];

  optional TPortoLayers PortoLayers = 9;
  optional string EnvironmentVariablesJson = 11 [default=""]; // JSON format: {"KEY1": "VALUE1", "KEY2": "VALUE2"}
  map<string, string> EnvironmentVariables = 12; // Direct map support (preferred)
  optional bool CleanupResources = 16 [default=true];
}


