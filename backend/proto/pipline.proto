package CPlane.Experiment;
import "cube.proto";
import "state.proto";
import "google/protobuf/any.proto";

message FileStorage {
  optional string Name = 1;
  optional string MountPoint = 2;
  optional DiskMeta Disk = 3;
  repeated FileMeta Files = 4;
}

// DiskMeta сообщение
message DiskMeta {
  optional string Type = 1;
  optional int64 SizeMB = 2;
}

// FileMeta сообщение
message FileMeta {
  required string SrcUrl = 1;
  optional string DstDir = 2;
  optional bool Unpack = 3;
  optional string Mode = 4; // длина=3, но в protobuf просто string
  optional bool Force = 5;
  optional string RenameTo=6;
}

message TStaticTableReadOptions {
  optional uint64 SplitShardsCount = 1;
}

message TKVTableReadOptions {
  optional uint64 DynTableShardsCount = 1;
  optional uint64 ProcessPeriodSeconds = 2;
  optional uint64 SplitShardsCount = 3;
}

message TQYTReadOptions {
  optional uint64 DelayMs = 1;
  optional bool ReadFullRowAsYson = 2 [default=false];
  optional bool VitalConsumer = 3 [default=true];
}

message TResharderInput {
  optional string SourceName = 1;
  repeated string ShardingKeys = 2;
  optional string ShardingHashKey = 6;
  optional bool ShardingRoundRobin = 7;
  optional string OutputName = 8;
  oneof choise {
    TStaticTableReadOptions StaticTableReadOptions = 3;
    TKVTableReadOptions KVTableReadOptions = 4;
    TQYTReadOptions QYTReadOptions = 5;
  }
}
message TIntermediateQueueOptions {
  optional uint64 ShardsCount = 1;
}
message TResharderConfig {
  repeated TResharderInput InputSources = 1;
  optional TIntermediateQueueOptions IntermediateQueueOptions = 3;
  optional TIntermediateQueueOptions LoopbackQueueOptions = 4;
}

message TGraphConfig {
  optional string Name = 1;
  repeated string OutputNames = 2;
  repeated string StateNames = 3;
  repeated CPlane.Cube.TCubeConfig Cubes = 4;
}

message TWorkerConfig {
  optional TGraphConfig GraphConfig = 1;
}

message TState {
  optional string StateName = 1;
  optional string KVSourceName = 2;
  oneof State {
    CPlane.State.TOwningKvStateOptions OwningKvState = 3;
  }
}

message ExperimentPlacement {
  repeated string OnecloudDatacenters=2;
}

// Для этого потребуется определить сообщения Namespace, DataCenter и PmsNamespace в пакете onecloud или убрать их сюда

// ExperimentResources сообщение
message ExperimentResources {
  required ResourceAllocation Resharder=1;
  required ResourceAllocation Worker=2;
}

// ResourceAllocation сообщение
message ResourceAllocation {
  required int64 ReplicasInDc=1;
  required int64 CpuCores=2;
  required int64 RamMB=3;
  required int64 NetworkInMbit=4;
  required int64 NetworkOutMbit=5;
}

message Schema {
  repeated Column columns =1 ;
}

message Column {
  map<string, google.protobuf.Any> properties = 1;
}

message TExperimentConfig {
  required ExperimentPlacement Placement = 1;
  required ExperimentResources Resources = 2;
  required TResharderConfig Resharder = 3;
  required TWorkerConfig Worker = 5;
  repeated TState States = 6;
  repeated FileStorage FileStorages = 7;
}