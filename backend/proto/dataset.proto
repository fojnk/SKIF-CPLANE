package CPlane.Dataset;
import "google/protobuf/struct.proto";

enum ESourceType {
  ST_QUEUE = 1;
  ST_KEY_VALUE = 2;
  ST_EXTERNAL_QUEUE = 3;
  ST_EXTERNAL_KEY_VALUE = 4;
  ST_STATIC_TABLE_DIR = 5;
}

message TDataset {
  message TYTSourceConfig {
    optional string Cluster = 1;
    optional string Path = 2;
  }
  enum EMessageFormat {
    MF_YSON = 1;
    MF_JSON = 2;
  }
  optional TYTSourceConfig YT = 1;
  optional uint64 ShardsCount = 2;
  optional bool NormalizedQYTSchema = 3 [default=false];
  repeated google.protobuf.Struct Attributes = 5;
  optional EMessageFormat MessageFormat = 4 [default=MF_YSON];
}
