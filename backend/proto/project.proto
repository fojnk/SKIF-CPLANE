package CPlane.Project;

message TYTConfig {
  optional string WorkDir = 1;
  optional string Cluster = 2;
  optional string ProxyRole = 3;
  optional string PrimaryMedium = 4;
  optional string TabletCellBundle = 5;
}

message TProjectConfig {
  optional TYTConfig YT = 1;
  optional string AbcProductId = 2;
}