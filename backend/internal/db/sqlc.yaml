version: "2"
sql:
  - engine: "postgresql"
    queries: "./queries/"
    schema: "../../migrations/up"
    gen:
      go:
        package: "core"
        out: "core"
        sql_package: "pgx/v5"
        emit_interface: true
        overrides:
          - db_type: "bool"
            go_type:
              type: "bool"
              pointer: true
