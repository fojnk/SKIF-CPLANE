services:
  postgres:
    image: postgres:13.3
    environment:
      POSTGRES_USER: frontend_cplane
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: frontend_cplane
      PGDATA: /var/lib/psql_data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontend_cplane -d frontend_cplane"]
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - pgdata:/var/lib/psql_data/pgdata

  backend:
    build:
      context: ./cplane/backend
      dockerfile: Dockerfile.local
    environment:
      CPLANE_CONFIG_PATH: /app/config.local.yaml
      DisableSSL: "true"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
