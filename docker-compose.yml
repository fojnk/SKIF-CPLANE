services:
  postgres:
    image: postgres:13.3
    environment:
      POSTGRES_USER: frontend_cplane
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: frontend_cplane
      PGDATA: /var/lib/psql_data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frontend_cplane -d frontend_cplane"]
      interval: 5s
      timeout: 10s
      retries: 10
    volumes:
      - pgdata:/var/lib/psql_data/pgdata

  # Локальная очередь для CPLANE и Java-супервизора. С хоста: localhost:5672, UI: http://localhost:15672 (cplane/cplane; не guest — иначе отказ подключений с других контейнеров)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    hostname: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: cplane
      RABBITMQ_DEFAULT_PASS: cplane
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    environment:
      CPLANE_CONFIG_PATH: /app/config.local.yaml
      DisableSSL: "true"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # Java-супервизор (skif_platform_supervisor). Репозиторий должен лежать рядом: ../skif_platform_supervisor
  java-supervisor:
    build:
      context: ../skif_platform_supervisor/development/supervisor
      dockerfile: Dockerfile
    image: skif-supervisor:local
    # Иначе Compose пытается pull skif-supervisor с Docker Hub (образа там нет).
    pull_policy: build
    user: root
    ports:
      - "8081:8080"
    environment:
      SPRING_PROFILES_ACTIVE: rabbit,docker
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
      RABBITMQ_USER: cplane
      RABBITMQ_PASSWORD: cplane
      # Вложенные docker-контейнеры моделей стартуют через docker.sock хоста.
      # Поэтому пути json должны быть "хостовыми" (доступными Docker Desktop), а не /app/...
      SUPERVISOR_PATHS_START_JSON_DIR_PATH: ${SUPERVISOR_HOST_WORKDIR:-/tmp/supervisor-work}/start_json_files
      SUPERVISOR_PATHS_END_JSON_DIR_PATH: ${SUPERVISOR_HOST_WORKDIR:-/tmp/supervisor-work}/end_json_files
      SUPERVISOR_PATHS_INTER_MODEL_JSON_DIR_PATH: ${SUPERVISOR_HOST_WORKDIR:-/tmp/supervisor-work}/inter_model_json_files
    volumes:
      - ../skif_platform_supervisor/development/supervisor/models:/app/models:ro
      # Монтируем host workdir в контейнер по тому же абсолютному пути:
      # java-supervisor пишет файлы в этот путь, а docker daemon читает его как host-path.
      - ${SUPERVISOR_HOST_WORKDIR:-/tmp/supervisor-work}:${SUPERVISOR_HOST_WORKDIR:-/tmp/supervisor-work}
      # Иначе каталог пустой: model_02 читает /json/sampleMaterial.json из inter-model-json-dir супервизора.
      - ../skif_platform_supervisor/development/supervisor/inter_model_json_files:${SUPERVISOR_HOST_WORKDIR:-/tmp/supervisor-work}/inter_model_json_files:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      rabbitmq:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pgdata:
